apiVersion: batch/v1
kind: CronJob
metadata:
  name: omnirag-confluence-indexer
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: indexer
              image: ghcr.io/karma-git/omnirag:latest
              command: ["python", "-m", "scripts.indexer"]
              args:
                - --source
                - confluence
                - --once
                - --storage-backend
                - s3
              envFrom:
                - secretRef:
                    name: omnirag-secrets
                - configMapRef:
                    name: omnirag-config
