services:
  omnirag:
    image: omnirag:local
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      # FAISS index lives here — built with scripts/index_documents.py
      - ./data:/app/data:ro
    restart: unless-stopped
    # Telegram long-polling needs outbound HTTPS only, no inbound ports needed
    network_mode: bridge
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: run the indexer as a one-off job
  # docker compose run --rm indexer --docs-dir /docs --out-dir /app/data
  indexer:
    image: omnirag:local
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["python", "scripts/index_documents.py"]
    volumes:
      - ./data:/app/data
      - ./docs:/docs:ro
      - ./scripts:/app/scripts:ro
    profiles:
      - tools
