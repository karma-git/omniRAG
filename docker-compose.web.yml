services:
  omnirag:
    image: omnirag:local
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      CHAT_PROVIDER: web
    ports:
      - "${WEB_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data:ro
      - ./user:/app/user:ro
    restart: unless-stopped

  indexer:
    image: omnirag:local
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["python", "-m", "scripts.indexer"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./docs:/app/docs:ro
    profiles:
      - tools
