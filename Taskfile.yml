version: '3'

vars:
  IMAGE: ghcr.io/karma-git/omnirag

tasks:

  # ── Dev ──────────────────────────────────────────────────────────────────────

  lint:
    desc: "Lint & format check (ruff)"
    cmds:
      - uv run ruff check .
      - uv run ruff format --check .

  lint:fix:
    desc: "Auto-fix lint & format issues"
    cmds:
      - uv run ruff check --fix .
      - uv run ruff format .

  test:
    desc: "Unit tests"
    cmds:
      - uv run pytest tests/ --ignore=tests/smoke -v --tb=short

  test:smoke:
    desc: "Smoke tests (no external APIs needed)"
    cmds:
      - uv run pytest tests/smoke/ -v --tb=short

  test:all:
    desc: "All tests (unit + smoke)"
    cmds:
      - task: test
      - task: test:smoke

  # ── Docker ───────────────────────────────────────────────────────────────────

  docker:build:
    desc: "Build local image"
    cmds:
      - docker build -t omnirag:local .

  docker:push:
    desc: "Build & push to GHCR  |  task docker:push -- 1.2.3"
    vars:
      VERSION: '{{.CLI_ARGS}}'
    requires:
      vars: [VERSION]
    cmds:
      - docker build --platform linux/amd64
          -t {{.IMAGE}}:{{.VERSION}}
          -t {{.IMAGE}}:latest .
      - docker push {{.IMAGE}}:{{.VERSION}}
      - docker push {{.IMAGE}}:latest
