name: Create feature PR

on:
  push:
    branches: [feat/confluence-hot-reload]

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr view feat/confluence-hot-reload --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base master \
              --head feat/confluence-hot-reload \
              --title "feat: add Confluence sync and FAISS hot reload" \
              --body "Adds incremental Confluence indexing, reconciled document caching, checksum-verified S3 snapshots, authenticated atomic hot reload, per-replica polling, tests, documentation, and a Kubernetes CronJob example."
