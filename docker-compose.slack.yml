services:
  omnirag:
    image: karmawow/omnirag:latest
    env_file:
      - .env
    volumes:
      - ./data:/app/data:ro          # FAISS index (faiss.index + chunks_meta.json)
      - ./user:/app/user:ro          # system prompt (system-prompt.md)
    restart: unless-stopped

  # One-off indexer: docker compose -f docker-compose.slack.yml run --rm indexer
  indexer:
    image: karmawow/omnirag:latest
    entrypoint: ["python", "scripts/index_documents.py"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data             # writes faiss.index + chunks_meta.json here
      - ./docs:/docs:ro              # put your .md / .txt / .pdf files here
